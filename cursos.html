<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

<section class="cursos-page">

  <div class="curso-card">
  <h3>Informática Básica</h3>

  <button class="btn-curso" onclick="inscreverCurso('Informática Básica')">
    Inscrever-se
  </button>
</div>

<div class="curso-card">
  <h3>Atendimento ao Cliente</h3>
 
  <button class="btn-curso" onclick="inscreverCurso('Atendimento ao Cliente')">
    Inscrever-se
  </button>
</div>

<div class="curso-card">
  <h3>Administração</h3>

  <button class="btn-curso" onclick="inscreverCurso('Administração')">
    Inscrever-se
  </button>
</div>

</section>
<div id="modalInscricao" class="modal">
  <div class="modal-content">

    <h2>Inscrição Realizada</h2>

    <p id="cursoSelecionado"></p>

    <button class="btn-curso" onclick="fecharModal()">
      Fechar
    </button>

  </div>
</div>
</body>
</html>
<script>

function inscreverCurso(nomeCurso) {

  document.getElementById("modalInscricao").style.display = "block";

  document.getElementById("cursoSelecionado").innerHTML =
    "Você se inscreveu no curso de <strong>" + nomeCurso + "</strong>";
}

function fecharModal() {
  document.getElementById("modalInscricao").style.display = "none";
}

</script>
