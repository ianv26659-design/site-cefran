<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

<section class="cursos-page">

 <div class="curso-card">

  <h3>Informática Básica</h3>
  <p>
    Vagas restantes:
    <span id="vaga-info">30</span>
  </p>

  <button class="btn-curso"
    onclick="inscreverCurso('Informática Básica', 'vaga-info')">

    Inscrever-se

  </button>

</div>

<div class="curso-card">

  <h3>Atendimento ao Cliente</h3>
  <p>
    Vagas restantes:
    <span id="vaga-atendimento">20</span>
  </p>

  <button class="btn-curso"
    onclick="inscreverCurso('Atendimento ao Cliente', 'vaga-atendimento')">

    Inscrever-se

  </button>

</div>

<div class="curso-card">

  <h3>Administração</h3>
  <p>
    Vagas restantes:
    <span id="vaga-admin">15</span>
  </p>

  <button class="btn-curso"
    onclick="inscreverCurso('Administração', 'vaga-admin')">

    Inscrever-se

  </button>

</div>


</section>
<div id="modalInscricao" class="modal">
  <div class="modal-content">

    <h2>Inscrição Realizada</h2>

    <p id="cursoSelecionado"></p>

    <button class="btn-curso" onclick="fecharModal()">
      Fechar
    </button>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
