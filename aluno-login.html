<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login do Aluno</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <span class="logo">Portal do Aluno</span>
</nav>

<section class="cursos-page">

<div class="cursos-container">

<h2>Login do Aluno</h2>

<input type="text" id="usuarioAluno" placeholder="Usuário" class="input-login">

<input type="password" id="senhaAluno" placeholder="Senha" class="input-login">

<button class="btn-curso" onclick="loginAluno()">
Entrar
</button>

<p id="mensagemAluno"></p>

</div>

</section>

<script>
function loginAluno() {
  const usuario = document.getElementById("usuarioAluno").value;
  const senha = document.getElementById("senhaAluno").value;

  if(usuario === "aluno" && senha === "123") {
    window.location.href = "aluno.html";
  } else {
    document.getElementById("mensagemAluno").innerHTML = "Usuário ou senha inválidos";
  }
}
</script>

</body>
</html>
